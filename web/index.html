<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web</title>
    <!-- Go html/template 会在启动时将 {{ .BasePath }} 渲染为实际的 custom_base_path 值 -->
    <!-- 本地开发（npm run dev）时 Vite 不解析 Go 模板，值保持字面量，前端代码会将其视为空字符串 -->
    <script>
      window.__BASE_PATH__ = '{{ .BasePath }}';
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
